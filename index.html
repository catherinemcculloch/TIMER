<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Focus Timer</title>
  <link rel="icon" href="assets/site-icon.svg">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header>
    <img src="assets/site-icon.svg" alt="Logo" class="header-logo">
    <h1>Focus Timer</h1>
  </header>
  <main>
    <section class="card timer-card">
      <div id="mode-label">Focus</div>
      <div class="timer-display" id="timer">25:00</div>
      <div class="time-editor" id="time-editor">
        <div class="time-input-group">
          <label for="edit-minutes">Minutes:</label>
          <input type="number" id="edit-minutes" min="0" max="99" value="25">
        </div>
        <div class="time-input-group">
          <label for="edit-seconds">Seconds:</label>
          <input type="number" id="edit-seconds" min="0" max="59" value="0">
        </div>
        <button id="apply-time-btn" class="btn-small">Apply</button>
      </div>
      <div class="controls">
        <button id="start-btn">Start</button>
        <button id="pause-btn" disabled>Pause</button>
        <button id="reset-btn">Reset</button>
      </div>
    </section>
    <section class="card">
      <h2>Sessions</h2>
      <div id="session-log"><p class="empty-msg">No completed sessions yet.</p></div>
    </section>
  </main>
  <footer>
    <p>Built at a <span id="workshop-name">CAIL Workshop</span></p>
  </footer>
  <script src="js/timer.js"></script>
  <script src="js/helpers.js"></script>
  <script src="js/app-init.js"></script>
</body>
</html>
